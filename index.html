    <style>
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { background: #080b10; color: #e8e4d9; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #080b10; }
      ::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 2px; }
      .gold-border { border-color: rgba(201,168,76,0.2); }
      .gold-border-strong { border-color: #c9a84c; }
      .track-pause:hover { animation-play-state: paused !important; }
      .mask-sides {
        -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }
      .project-card:hover .project-bar { transform: scaleX(1); }
      .project-bar { transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { display:inline-block; animation: blink 1s step-end infinite; }
    </style>
